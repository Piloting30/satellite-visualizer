<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Satellite Visualizer</title>

  <link rel="stylesheet" href="/src/ui.css" />

</head>

<body>

  <!-- Satellite Loading Overlay -->
  <div id="loading-overlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Loading Satellites...</p>
    </div>
  </div>

  <!-- 3D canvas will still be inserted by Three.js -->
  <div id="ui-overlay">

    <!-- Search Bar -->
    <div id="search-container">
      <input id="search-input" type="text" placeholder="Find Russian recon satellites in LEO..." />
      <button id="search-btn">Search</button>
    </div>

    <!-- Settings Button -->
    <button id="settings-btn">⚙ Settings</button>

  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden">

    <div class="modal-content">

      <h2>Claude API Key</h2>

      <p>
        Paste your Anthropic API key below.
        It will be stored locally in your browser.
      </p>

      <input id="api-key-input" type="password" placeholder="sk-ant-..." />

      <div class="modal-buttons">
        <button id="save-key-btn">Save</button>
        <button id="close-modal-btn">Close</button>
      </div>

    </div>

  </div>

  <div id="satellite-hover-card" class="hidden"></div>

  <div id="satellite-detail-card" class="hidden">
    <div id="detail-content"></div>
    <button id="close-detail">Close</button>
  </div>

  <script type="module" src="/src/search.js"></script>
  <script type="module" src="/src/main.js"></script>

</body>

</html>
